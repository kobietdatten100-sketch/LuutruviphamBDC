<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống kỷ luật quân nhân</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

.header{
    background:#020617;
    padding:15px;
    text-align:center;
    font-weight:bold;
    border-bottom:1px solid #1e293b;
}

.container{
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input,button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:6px;
}

input{width:180px;}

.table{
    width:100%;
    border-collapse:collapse;
}

.table th,.table td{
    border:1px solid #334155;
    padding:8px;
    text-align:center;
}

.bad{color:red;}
.warn{color:orange;}
.good{color:limegreen;}
</style>
</head>

<body>

<div class="header">
HỆ THỐNG QUẢN LÝ KỶ LUẬT QUÂN NHÂN
</div>

<div class="container">

<div class="card">
<h3>Thêm kỷ luật</h3>

<input id="name" placeholder="Họ tên">
<input id="rank" placeholder="Quân hàm">
<input id="level" placeholder="Mức kỷ luật (0-10)">
<br>
<input id="error" placeholder="Lỗi vi phạm">
<input id="penalty" placeholder="Hình thức xử phạt">
<br>
<label>Từ:</label>
<input type="date" id="start">
<label>Đến:</label>
<input type="date" id="end">
<br>
<button onclick="add()">Thêm</button>
</div>

<div class="card">
<h3>Danh sách sĩ quan</h3>

<table class="table">
<thead>
<tr>
<th>Tên</th>
<th>Quân hàm</th>
<th>Kỷ luật</th>
<th>Lỗi</th>
<th>Hình phạt</th>
<th>Hiệu lực</th>
<th>Trạng thái</th>
<th>Xoá</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

</div>

<script>

/* ===== DỮ LIỆU GHI TRỰC TIẾP Ở ĐÂY ===== */
let data = [
{
    name:"8rpigli",
    rank:"Thiếu úy",
    level:5,
    error:"Vi phạm nội quy",
    penalty:"giam quân hàm",
    start:"2026-04-28",
    end:"2026-05-28"
},
{
    name:"utkhoQuan4",
    rank:"Trung sĩ",
    level:8,
    error:"vì phạm nội quy",
    penalty:"giam quân hàm",
    start:"2026-04-28",
    end:"2026-05-28"
}
];

/* ===== THÊM ===== */
function add(){

    let o = {
        name: name.value,
        rank: rank.value,
        level: parseFloat(level.value),
        error: error.value,
        penalty: penalty.value,
        start: start.value,
        end: end.value
    };

    data.push(o);
    render();
}

/* ===== XOÁ ===== */
function remove(i){
    data.splice(i,1);
    render();
}

/* ===== HIỂN THỊ ===== */
function render(){

    let list=document.getElementById("list");
    list.innerHTML="";

    data.forEach((o,i)=>{

        let status =
            o.level>=7
            ? '<span class="bad">NẶNG</span>'
            : o.level>=4
            ? '<span class="warn">CẢNH CÁO</span>'
            : '<span class="good">BÌNH THƯỜNG</span>';

        list.innerHTML+=`
        <tr>
            <td>${o.name}</td>
            <td>${o.rank}</td>
            <td>${o.level}</td>
            <td>${o.error}</td>
            <td>${o.penalty}</td>
            <td>${o.start} → ${o.end}</td>
            <td>${status}</td>
            <td><button onclick="remove(${i})">Xoá</button></td>
        </tr>
        `;
    });
}

render();

</script>

<footer style="
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:5px;
font-size:12px;
background:#020617;
border-top:1px solid #1e293b;
">
© 2026 Military BDC | Owner: Thien Nguyen
</footer>

</body>
</html>
